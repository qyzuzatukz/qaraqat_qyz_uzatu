<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fleur+De+Leah&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fleur+De+Leah&family=Italianno&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
</head>


<body>
    
    <audio id="bg-music" src="Karakat-Abildina-Kyzga-tilek-agugai.kz_.mp3" loop></audio>

    <section class="hero-screen">
    
    <div class="image-container">
        <img src="IMG_7620.PNG" alt="Qaraqat" class="back-image">
        <div class="video-overlay"></div>
    </div>

    <div class="hero-content">
        
        <div class="header-text">
            <h1 class="bride-name" style="font-size: 70px;">Qaraqat</h1>
            <p class="event-title" style="font-size: 45px;">qyz uzatu</p>
        </div>
        
        <div class="music-wrapper">
            <button class="music-toggle" id="music-btn">
                <svg class="spinning-text" viewBox="0 0 100 100">
                    <path id="circlePath" d="M 50, 50 m -35, 0 a 35,35 0 1,1 70,0 a 35,35 0 1,1 -70,0" />
                    <text>
                        <textPath href="#circlePath">әуенді қосу • пауза • </textPath>
                    </text>
                </svg>
                <div class="play-icon"></div>
            </button>
        </div>
        
    </div>

</section>

<section class="invitation-screen">
    <div class="invitation-content">
        
        <div class="guests-call" style="font-size: 37px;">
            Құрметті<br>
            ағайын-туыс, бауырлар,<br>
            құда-жекжат,<br>
            нағашы-жиен, бөлелер,<br>
            құрбы-құрдас,<br>
            дос-жарандар,<br>
            әріптестер мен көршілер!
        </div>

        <div class="main-invitation-text">
            <p class="sub-text" style="font-size: 24px;">Сіздерді<br>аяулы қызымыз</p>
            
            <h2 class="bride-title-second" style="font-size: 50px;">Қарақаттың</h2>
            
            <p class="description-text" style="font-size: 24px;">
                ұзату тойына арналған<br>
                салтанатты ақ<br>
                дастарханымыздың қадірлі<br>
                қонағы болуға шақырамыз!
            </p>
        </div>

    </div>
</section>

<div class="flowers-divider">
    <img src="IMG_7635.jpeg" alt="Декор цветы" class="divider-image">
</div>





































    <script src="script.js"></script>
    
</body>



</html>
